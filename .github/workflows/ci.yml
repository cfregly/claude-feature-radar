name: ci

# The full offline gate chain, the same `make ci` that runs locally: deslop, the cost-claim gate,
# docs-vs-code, the compile/import one-dependency check, check-surface, check-receipts, and the
# offline tests. No key, no network, no spend. GitHub and local now have the same behavioral coverage.

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: build the venv (anthropic + pytest, the only deps make ci needs)
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet anthropic pytest
      - name: the full offline gate chain (identical to local `make ci`)
        run: make ci
